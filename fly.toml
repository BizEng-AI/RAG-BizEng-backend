# fly.toml app configuration file generated for bizeng-server on 2025-11-08T19:08:21+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bizeng-server'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8020
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
